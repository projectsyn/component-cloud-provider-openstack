apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: null
  labels:
    app: openstack-cinder-csi
    chart: openstack-cinder-csi-2.36.0
    component: controllerplugin
    heritage: Helm
    release: cinder-csi
  name: openstack-cinder-csi-controllerplugin
  namespace: syn-cloud-provider-openstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openstack-cinder-csi
      component: controllerplugin
      release: cinder-csi
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations: null
      labels:
        app: openstack-cinder-csi
        chart: openstack-cinder-csi-2.36.0
        component: controllerplugin
        heritage: Helm
        release: cinder-csi
    spec:
      affinity: {}
      containers:
        - args:
            - -v=2
            - --csi-address=$(ADDRESS)
            - --timeout=3m
            - --leader-election=true
            - --default-fstype=ext4
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          image: registry.k8s.io/sig-storage/csi-attacher:v4.10.0
          imagePullPolicy: IfNotPresent
          name: csi-attacher
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
          securityContext: {}
          volumeMounts:
            - mountPath: /var/lib/csi/sockets/pluginproxy/
              name: socket-dir
        - args:
            - -v=2
            - --csi-address=$(ADDRESS)
            - --timeout=3m
            - --leader-election=true
            - --default-fstype=ext4
            - --feature-gates=Topology=true
            - --extra-create-metadata
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.3.0
          imagePullPolicy: IfNotPresent
          name: csi-provisioner
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
          securityContext: {}
          volumeMounts:
            - mountPath: /var/lib/csi/sockets/pluginproxy/
              name: socket-dir
        - args:
            - -v=2
            - --csi-address=$(ADDRESS)
            - --timeout=3m
            - --leader-election=true
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.4.0
          imagePullPolicy: IfNotPresent
          name: csi-snapshotter
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
          securityContext: {}
          volumeMounts:
            - mountPath: /var/lib/csi/sockets/pluginproxy/
              name: socket-dir
        - args:
            - -v=2
            - --csi-address=$(ADDRESS)
            - --timeout=3m
            - --handle-volume-inuse-error=false
            - --leader-election=true
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          image: registry.k8s.io/sig-storage/csi-resizer:v1.14.0
          imagePullPolicy: IfNotPresent
          name: csi-resizer
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
          securityContext: {}
          volumeMounts:
            - mountPath: /var/lib/csi/sockets/pluginproxy/
              name: socket-dir
        - args:
            - -v=2
            - --csi-address=$(ADDRESS)
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          image: registry.k8s.io/sig-storage/livenessprobe:v2.17.0
          imagePullPolicy: IfNotPresent
          name: liveness-probe
          resources: {}
          securityContext: {}
          volumeMounts:
            - mountPath: /var/lib/csi/sockets/pluginproxy/
              name: socket-dir
        - args:
            - /bin/cinder-csi-plugin
            - -v=2
            - --endpoint=$(CSI_ENDPOINT)
            - --cloud-config=$(CLOUD_CONFIG)
            - --cluster=$(CLUSTER_NAME)
            - --provide-node-service=false
            - --http-endpoint=:8080
          env:
            - name: CSI_ENDPOINT
              value: unix://csi/csi.sock
            - name: CLOUD_CONFIG
              value: /etc/config/cloud.conf
            - name: CLUSTER_NAME
              value: c-green-test-1234
          image: registry.k8s.io/provider-os/cinder-csi-plugin:v1.35.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 10
          name: cinder-csi-plugin
          ports:
            - containerPort: 9808
              name: healthz
              protocol: TCP
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
          securityContext: {}
          volumeMounts:
            - mountPath: /csi
              name: socket-dir
            - mountPath: /etc/config
              name: cloud-config
              readOnly: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ''
      securityContext: {}
      serviceAccount: csi-cinder-controller-sa
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
      volumes:
        - emptyDir: null
          name: socket-dir
        - name: cloud-config
          secret:
            secretName: cloud-config
