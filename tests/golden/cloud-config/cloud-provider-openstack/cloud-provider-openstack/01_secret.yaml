apiVersion: v1
kind: Secret
metadata:
  annotations: {}
  labels:
    name: cloud-config
  name: cloud-config
  namespace: syn-cloud-provider-openstack
stringData:
  cloud.conf: |
    [Global]
    application-credential-id=d1a2b3c4e5f6a7b8c9d0e1f2a3b4c5d6
    application-credential-secret=verysecretsecret
    auth-url=https://identity.api.example.cloud/v3
    region=zhw

    [LoadBalancer]
    floating-network-id=a1b2c3d4-e5f6-7890-abcd-ef1234567890
    lb-method=SOURCE_IP_PORT
    lb-provider=ovn
    lb-version=v2
    manage-security-groups=true
    subnet-id=

    [BlockStorage]
    bs-version=auto
    ignore-volume-az=false
    trust-device-path=false

    [Metadata]
    search-order=configDrive
type: Opaque
