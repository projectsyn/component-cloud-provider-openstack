apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations: null
  labels:
    app.kubernetes.io/instance: openstack-ccm
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openstack-cloud-controller-manager
    app.kubernetes.io/version: v1.35.0
    helm.sh/chart: openstack-cloud-controller-manager-2.35.0
  name: system:cloud-controller-manager
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update
  - apiGroups:
      - ''
    resources:
      - events
    verbs:
      - create
      - patch
      - update
  - apiGroups:
      - ''
    resources:
      - nodes
    verbs:
      - '*'
  - apiGroups:
      - ''
    resources:
      - nodes/status
    verbs:
      - patch
  - apiGroups:
      - ''
    resources:
      - services
    verbs:
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ''
    resources:
      - services/status
    verbs:
      - patch
  - apiGroups:
      - ''
    resources:
      - serviceaccounts/token
    verbs:
      - create
  - apiGroups:
      - ''
    resources:
      - serviceaccounts
    verbs:
      - create
      - get
  - apiGroups:
      - ''
    resources:
      - persistentvolumes
    verbs:
      - '*'
  - apiGroups:
      - ''
    resources:
      - endpoints
    verbs:
      - create
      - get
      - list
      - watch
      - update
  - apiGroups:
      - ''
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ''
    resources:
      - secrets
    verbs:
      - list
      - get
      - watch
